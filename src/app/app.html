
<body>
<input type="text" [(ngModel)]="countnum" readonly class="read"><br><br>


<div class="set">
<button (click)="min()" class="red" >-</button>


<button (click)="reset()" class="gray">RESET</button>


<button (click)="add()" class="green">+</button>

</div>


<input type="number" max="1000" [(ngModel)]="yournum" class="your"   (input)="countnum=yournum"   (ngModelChange)="check()">

</body>
